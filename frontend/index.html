<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inabot Eyes</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="stage" aria-label="Cara animada de Inabot">
    <section class="face" data-emotion="sleepy" aria-live="polite">
      <div class="eye eye-left" aria-hidden="true">
        <div class="eye-glow"></div>
        <div class="spark spark-a"></div>
        <div class="spark spark-b"></div>
      </div>

      <div class="eye eye-right" aria-hidden="true">
        <div class="eye-glow"></div>
        <div class="spark spark-a"></div>
        <div class="spark spark-b"></div>
      </div>

      <div class="emotion-mark" aria-hidden="true"></div>
      <div class="sleep-z" aria-hidden="true">
        <span>Z</span>
        <span>z</span>
        <span>Z</span>
        <span>z</span>
      </div>
      <div class="thinking-cloud" aria-hidden="true">
        <span>?</span>
        <span>?</span>
        <span>?</span>
        <span>?</span>
      </div>
      <div class="talk-wave" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
      </div>
    </section>

    <aside class="support-box" aria-label="Mensaje de apoyo">
      <output class="support-text" data-support-text data-emotion="sleepy"></output>
    </aside>
  </main>

  <script src="js/eyes.js"></script>
</body>
</html>
